# Configurações do Banco de Dados MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/esportsdb?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root

# Configurações do JPA/Hibernate
# Atualiza o esquema do banco automaticamente com base nas entidades
spring.jpa.hibernate.ddl-auto=update
# Exibe as queries SQL executadas no console (útil para desenvolvimento)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
