<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Cadastro de Torneio</title>
    <style>
        body { font-family: sans-serif; padding: 20px; max-width: 600px; margin: auto; color: #333; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input[type="text"], input[type="number"], input[type="date"] { width: 100%; padding: 8px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; }
        .btn { padding: 10px 15px; background: #28a745; color: white; border: none; cursor: pointer; border-radius: 4px; font-size: 16px; }
        .btn:hover { background: #218838; }
        .alert { padding: 10px; margin-bottom: 20px; border-radius: 4px; }
        .alert-error { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
    </style>
</head>
<body>
    <h1 th:text="${torneio.id == null ? 'Novo Torneio' : 'Editar Torneio'}">Novo Torneio</h1>

    <div th:if="${mensagemErro}" class="alert alert-error" th:text="${mensagemErro}"></div>

    <form th:action="@{/torneios/salvar}" th:object="${torneio}" method="post">
        <input type="hidden" th:field="*{id}" />

        <div class="form-group">
            <label for="nome">Nome do Torneio:</label>
            <input type="text" id="nome" th:field="*{nome}" required placeholder="Ex: CBLOL" />
        </div>

        <div class="form-group">
            <label for="premiacao">Premiação Total (R$):</label>
            <input type="number" id="premiacao" th:field="*{premiacao}" step="0.01" min="0" placeholder="Ex: 50000.00" />
        </div>

        <div class="form-group">
            <label for="dataInicio">Data de Início:</label>
            <input type="date" id="dataInicio" th:field="*{dataInicio}" required />
        </div>
        
        <div class="form-group">
            <label for="dataFim">Data de Término:</label>
            <input type="date" id="dataFim" th:field="*{dataFim}" required />
        </div>

        <button type="submit" class="btn">Salvar Torneio</button>
        <a th:href="@{/torneios}" style="margin-left: 10px; text-decoration: none; color: #007bff;">Cancelar</a>
    </form>
</body>
</html>
