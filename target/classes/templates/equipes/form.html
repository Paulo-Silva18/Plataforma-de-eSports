<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Cadastro de Equipe</title>
    <style>
        body { font-family: sans-serif; padding: 20px; max-width: 600px; margin: auto; color: #333; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input[type="text"], input[type="date"] { width: 100%; padding: 8px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; }
        .btn { padding: 10px 15px; background: #28a745; color: white; border: none; cursor: pointer; border-radius: 4px; font-size: 16px; }
        .btn:hover { background: #218838; }
        .alert { padding: 10px; margin-bottom: 20px; border-radius: 4px; }
        .alert-error { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
    </style>
</head>
<body>
    <h1 th:text="${equipe.id == null ? 'Nova Equipe' : 'Editar Equipe'}">Nova Equipe</h1>

    <div th:if="${mensagemErro}" class="alert alert-error" th:text="${mensagemErro}"></div>

    <form th:action="@{/equipes/salvar}" th:object="${equipe}" method="post">
        <input type="hidden" th:field="*{id}" />

        <div class="form-group">
            <label for="nome">Nome:</label>
            <input type="text" id="nome" th:field="*{nome}" required placeholder="Nome da Equipe" />
        </div>

        <div class="form-group">
            <label for="tag">TAG (Máx 5 carac.):</label>
            <input type="text" id="tag" th:field="*{tag}" maxlength="5" required placeholder="TAG" />
        </div>

        <div class="form-group">
            <label for="dataFundacao">Data de Fundação:</label>
            <input type="date" id="dataFundacao" th:field="*{dataFundacao}" />
        </div>

        <button type="submit" class="btn">Salvar</button>
        <a th:href="@{/equipes}" style="margin-left: 10px; text-decoration: none; color: #007bff;">Cancelar</a>
    </form>
</body>
</html>
